version: '3.8'
services:
  db-notifications:
    image: mysql:8.0
    container_name: mysql-notifications
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notifications_db
    ports:
      - "3306:3306"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-service
    ports:
      - "5672:5672"
      - "15672:15672"

  notification-service:
    build: .
    container_name: dotnet-notification-app
    depends_on:
      - db-notifications
      - rabbitmq
    environment:
      - ConnectionStrings__DefaultConnection=Server=db-notifications;Database=notifications_db;Uid=root;Pwd=root;
      - RabbitMQ__Host=rabbitmq
    ports:
      - "8080:8080"